<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>EQ Pro</title>
<style>
  :root {
    --bg:       #0d0f14;
    --panel:    #13151f;
    --panel2:   #1a1d2a;
    --border:   rgba(124,111,255,0.18);
    --accent:   #7c6fff;
    --accent2:  #a78bfa;
    --green:    #4ade80;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --danger:   #f87171;
    --track:    #1e2130;
    --thumb:    #7c6fff;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width: 560px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    user-select: none;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .logo {
    display: flex; align-items: center; gap: 8px;
  }
  .logo-icon { font-size: 18px; }
  .logo-text {
    font-size: 15px; font-weight: 700; letter-spacing: 1px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .power-btn {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer;
  }
  .power-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--muted);
    box-shadow: none;
    transition: all 0.3s;
  }
  .power-dot.on {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
  }
  .power-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* ── VOLUME BOOSTER ── */
  .section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .section-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .volume-row {
    display: flex; align-items: center; gap: 12px;
  }
  .volume-icon { font-size: 16px; flex-shrink: 0; }

  /* Horizontaler Range Slider – Webkit + Moz */
  .vol-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: var(--track);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
    position: relative;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    cursor: pointer;
    box-shadow: 0 0 10px rgba(124,111,255,0.5);
    border: 2px solid rgba(255,255,255,0.2);
    transition: box-shadow 0.2s;
  }
  .vol-slider::-moz-range-thumb {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    cursor: pointer;
    box-shadow: 0 0 10px rgba(124,111,255,0.5);
    border: 2px solid rgba(255,255,255,0.2);
  }
  .vol-slider::-webkit-slider-runnable-track {
    height: 6px; border-radius: 3px;
  }
  .vol-slider::-moz-range-track {
    height: 6px; border-radius: 3px; background: var(--track);
  }
  .vol-value {
    min-width: 52px; text-align: right;
    font-size: 16px; font-weight: 700;
    color: var(--accent2);
  }

  /* ── EQ BANDS ── */
  .eq-section { padding: 12px 16px 8px; }
  .eq-bands {
    display: flex;
    gap: 4px;
    justify-content: space-between;
    align-items: flex-end;
    height: 160px;
    padding: 8px 4px;
    background: var(--panel2);
    border-radius: 8px;
    border: 1px solid var(--border);
    position: relative;
  }

  /* Center line */
  .eq-bands::before {
    content: '';
    position: absolute;
    left: 8px; right: 8px;
    top: 50%;
    height: 1px;
    background: rgba(124,111,255,0.2);
    pointer-events: none;
  }

  .band {
    display: flex; flex-direction: column;
    align-items: center; flex: 1;
    gap: 4px; height: 100%; justify-content: space-between;
  }

  .band-val {
    font-size: 9px; color: var(--accent2); font-weight: 600;
    min-height: 14px; text-align: center;
    line-height: 14px;
  }

  /* Vertikaler Slider – Firefox-Trick: rotierter horizontaler Slider */
  .band-slider-wrap {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    width: 100%;
    overflow: hidden;
  }

  .band-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 108px; /* wird durch rotate zu height */
    height: 26px;
    transform: rotate(-90deg);
    transform-origin: center center;
    background: var(--track);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  .band-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    cursor: pointer;
    box-shadow: 0 0 8px rgba(124,111,255,0.6);
    border: 2px solid rgba(255,255,255,0.25);
  }
  .band-slider::-moz-range-thumb {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    cursor: pointer;
    box-shadow: 0 0 8px rgba(124,111,255,0.6);
    border: 2px solid rgba(255,255,255,0.25);
  }
  .band-slider::-webkit-slider-runnable-track {
    height: 6px; border-radius: 3px; background: var(--track);
  }
  .band-slider::-moz-range-track {
    height: 6px; border-radius: 3px; background: var(--track);
  }

  .band-label {
    font-size: 9px; color: var(--muted);
    text-align: center;
  }

  /* dB labels links */
  .eq-scale {
    position: absolute; left: 4px; top: 0; bottom: 0;
    display: flex; flex-direction: column;
    justify-content: space-between; padding: 6px 0;
    pointer-events: none;
  }
  .eq-scale span { font-size: 8px; color: rgba(100,116,139,0.5); }

  /* ── PRESETS ── */
  .presets-section { padding: 10px 16px; border-top: 1px solid var(--border); }
  .presets-grid {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .preset-btn {
    padding: 5px 12px;
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 20px;
    cursor: pointer;
    font-size: 11px; font-weight: 500;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .preset-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .preset-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 0 12px rgba(124,111,255,0.4);
  }

  /* ── FOOTER ── */
  .footer {
    display: flex; gap: 6px;
    padding: 10px 16px 12px;
    border-top: 1px solid var(--border);
  }
  .footer-btn {
    flex: 1; padding: 7px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px; cursor: pointer;
    font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .footer-btn:hover { border-color: var(--accent); color: var(--text); }

  .drm-banner {
    margin: 0 16px 10px;
    padding: 8px 12px;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 6px;
    color: var(--danger);
    font-size: 11px; text-align: center;
    display: none;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <span class="logo-icon">🎚️</span>
    <span class="logo-text">EQ PRO</span>
  </div>
  <div class="power-btn" id="powerBtn">
    <div class="power-dot on" id="powerDot"></div>
    <span class="power-label" id="powerLabel">AN</span>
  </div>
</div>

<!-- VOLUME BOOSTER -->
<div class="section">
  <div class="section-label">🔊 Volume Booster</div>
  <div class="volume-row">
    <span class="volume-icon">🔇</span>
    <input type="range" class="vol-slider" id="volSlider" min="0" max="600" step="1" value="100">
    <span class="volume-icon">💥</span>
    <span class="vol-value" id="volValue">100%</span>
  </div>
</div>

<!-- EQ BANDS -->
<div class="eq-section">
  <div class="section-label" style="margin-bottom:8px">🎛️ 10-Band EQ</div>
  <div class="eq-bands" id="eqBands">
    <div class="eq-scale">
      <span>+12</span>
      <span>0</span>
      <span>-12</span>
    </div>
  </div>
</div>

<!-- PRESETS -->
<div class="presets-section">
  <div class="section-label" style="margin-bottom:8px">⚡ Presets</div>
  <div class="presets-grid" id="presetsGrid"></div>
</div>

<div style="padding:6px 16px;font-size:11px;color:#4ade80" id="statusLine">Suche Media-Elemente...</div>

<!-- FOOTER -->
<div class="footer">
  <button class="footer-btn" id="flatBtn">Flat</button>
  <button class="footer-btn" id="resetBtn">Reset Alles</button>
</div>

<script src="popup.js"></script>
</body>
</html>
